name: Build APK

on:
  push:
    branches: [ kivy-build ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Buildozer
        run: |
          pip install buildozer
          sudo apt update
          sudo apt install -y libffi-dev libssl-dev autoconf automake libtool
      
      - name: Build APK
        run: |
          buildozer android debug || true
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          if [ -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
            yes | $ANDROID_HOME/tools/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses
          fi
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MashinistGram-Kivy-APK
          path: bin/*.apk
